kind = "web"
previewPath = "/"
title = "SC Santiago Corretora de Seguros"
version = "1.0.0"
id = "artifacts/sc-santiago"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18725

[services.development]
run = "pnpm --filter @workspace/sc-santiago run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/sc-santiago", "run", "build" ]
publicDir = "artifacts/sc-santiago/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18725"
BASE_PATH = "/"
